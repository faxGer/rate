  <style>
    :root {
      /* Deep Blue and Glowing Pink Theme */
      --primary: #ff007f; /* Glowing Pink */
      --accent: #001d47;  /* Deep Blue */
      --bg: #000c1d;      /* Very Dark Blue Background */
      --text: #ffffff;
      --loader-bg: #000c1d;
      --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      height: 100dvh;
      overflow: hidden;
      background-color: var(--bg);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    .app-wrapper {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    /* Iframe Optimization */
    #main-app {
      flex: 1;
      width: 100%;
      height: 100%;
      border: none;
      opacity: 0;
      transition: var(--transition);
      z-index: 1;
    }

    #main-app.loaded {
      opacity: 1;
    }

    /* Loader Overlay */
    .loader-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: var(--loader-bg);
      z-index: 100;
      transition: var(--transition);
    }

    .spinner-box {
      position: relative;
      width: 65px;
      height: 65px;
    }

    .spinner {
      width: 100%;
      height: 100%;
      border: 3px solid rgba(255, 0, 127, 0.1);
      border-top: 3px solid var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      box-shadow: 0 0 15px rgba(255, 0, 127, 0.5); /* Glowing Effect */
    }

    .loading-status {
      margin-top: 25px;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--primary);
      letter-spacing: 2px;
      text-transform: uppercase;
      text-shadow: 0 0 10px rgba(255, 0, 127, 0.4);
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    /* Background Pulse for Deep Blue Feel */
    .loader-overlay::before {
      content: '';
      position: absolute;
      width: 300px;
      height: 300px;
      background: var(--primary);
      filter: blur(100px);
      opacity: 0.15;
      animation: pulse 3s infinite ease-in-out;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.1; transform: scale(1); }
      50% { opacity: 0.2; transform: scale(1.3); }
    }
  </style>
</head>
<body>

  <div class="app-wrapper">
    <div class="loader-overlay" id="loader">
      <div class="spinner-box">
        <div class="spinner"></div>
      </div>
      <div class="loading-status" id="status-text">FaxGer Initializing...</div>
    </div>

    <iframe
      id="main-app"
      src="https://script.google.com/macros/s/AKfycbyMBdyMaVCTKRoVdrvhdoA9bJavxkqjbNJcvYCwbf9y3jrnngXPgZ7XNN_MEW5zONiZ/exec"
      title="FaxGer Global Logistics Dashboard"
      allow="geolocation; camera; clipboard-write"
      loading="eager">
    </iframe>
  </div>

  <script>
    const iframe = document.getElementById('main-app');
    const loader = document.getElementById('loader');
    const statusText = document.getElementById('status-text');

    // 1. Smooth Transition Logic
    iframe.onload = function() {
      statusText.innerText = "Syncing with Server...";
      
      setTimeout(() => {
        iframe.classList.add('loaded');
        loader.classList.add('hidden');
      }, 800);
    };

    // 2. Network Check
    window.addEventListener('offline', () => {
      statusText.innerText = "Offline - Check Connection";
      statusText.style.color = "#ff4757";
    });

    window.addEventListener('online', () => {
      statusText.innerText = "Reconnecting...";
      statusText.style.color = "var(--primary)";
    });

    // 3. Fallback
    setTimeout(() => {
      if (!iframe.classList.contains('loaded')) {
        iframe.classList.add('loaded');
        loader.classList.add('hidden');
      }
    }, 15000);

    // 4. iOS Scale Fix
    document.addEventListener('touchmove', function (e) {
      if (e.scale !== 1) { e.preventDefault(); }
    }, { passive: false });
  </script>

</body>
