<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>FaxGer Global Logistics</title>
  
  <link rel="icon" href="https://lh3.googleusercontent.com/d/13QoaBni9mY0tTYPkCodu4KSqe0syFkrZ" type="image/png">
  <link rel="apple-touch-icon" href="https://lh3.googleusercontent.com/d/13QoaBni9mY0tTYPkCodu4KSqe0syFkrZ">

  <style>
    :root {
      --primary-color: #0099ff;
      --bg-color: #f4f4f9;
    }

    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      overflow: hidden;
      background-color: var(--bg-color);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    .iframe-container {
      position: relative;
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Fixed the height to be dynamic and handle mobile address bars */
    iframe {
      flex-grow: 1;
      width: 100%;
      border: none;
      display: block;
      -webkit-overflow-scrolling: touch;
    }

    .loader-wrapper {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 10;
      transition: opacity 0.3s ease;
    }

    .spinner {
      border: 3px solid rgba(0, 0, 0, 0.05);
      width: 45px;
      height: 45px;
      border-radius: 50%;
      border-top-color: var(--primary-color);
      animation: spin 0.8s linear infinite;
      display: inline-block;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      margin-top: 12px;
      color: #666;
      font-size: 14px;
      font-weight: 500;
      display: block;
      letter-spacing: 0.5px;
    }

    /* Smooth Fade Out for Loader */
    .fade-out {
      opacity: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <div class="iframe-container">
    <div class="loader-wrapper" id="loader">
      <div class="spinner"></div>
      <span class="loading-text">Connecting to FaxGer...</span>
    </div>

    <iframe
      id="main-app"
      src="https://script.google.com/macros/s/AKfycbxOc8JuoPU4A45NK48WYGFWxfdIzoh7K-geG3F1AAadVy6XsrXfeCIm4dK3mNzMuqeJ/exec"
      title="FaxGer Global Logistics"
      onload="hideLoader()"
      allow="geolocation; microphone; camera">
    </iframe>
  </div>

  <script>
    function hideLoader() {
      const loader = document.getElementById('loader');
      loader.classList.add('fade-out');
      // Completely remove from DOM after fade
      setTimeout(() => {
        loader.style.display = 'none';
      }, 300);
    }

    // Safety timeout: Hide loader if iframe fails to trigger onload after 10s
    setTimeout(() => {
      if(document.getElementById('loader').style.display !== 'none') {
        hideLoader();
      }
    }, 10000);
  </script>

</body>
</html>
